# Files and directories the alexandria update process writes into every
# collection. The update script reads this file to know what to track.
#
# A path ending in "/" is a directory: every file beneath it (recursively) is
# tracked. A plain path is a single file.
#
# When alexandria starts managing a new file, add its path (or a parent
# directory) here in the same release. This is how the set of upstream-managed
# files stays explicit and reviewable.

paths:
  - pyproject.toml
  - .claude/skills/
  - tools/

# Deliberately NOT managed:
#   CLAUDE.md — per-collection content written by /coll-build-new-collection.
#     The alexandria repo has its own CLAUDE.md with different purpose (dev
#     instructions for the repo, not for a collection), so we must not copy
#     alexandria's version over a collection's.
#   .collection-index.yaml, collection-context.md, README.md — collection
#     content, not alexandria infrastructure.
